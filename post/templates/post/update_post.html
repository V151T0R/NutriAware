{% extends "base.html" %}

{% block title %}Edit Post | NutriAware{% endblock %}

{% block content %}
<style>
    .form-container {
        background-color: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 2rem;
        max-width: 700px;
        margin: 2rem auto; 
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    .page-title {
        color: var(--text-main);
        text-align: center;
        margin-bottom: 2rem;
    }

    .form-group {
        margin-bottom: 1.5rem;
        display: flex;
        flex-direction: column;
    }

    .form-group label {
        color: var(--text-main);
        margin-bottom: 0.5rem;
        font-weight: 500;
    }

    .form-group input, 
    .form-group textarea {
        background-color: var(--bg-main);
        border: 1px solid var(--border-color);
        color: var(--text-main);
        padding: 0.8rem;
        border-radius: 6px;
        font-family: 'Poppins', sans-serif;
        font-size: 1rem;
        transition: border-color 0.2s ease, background-color 0.3s ease, color 0.3s ease;
    }

    .form-group input:focus, 
    .form-group textarea:focus {
        outline: none;
        border-color: var(--brand-color);
    }

    .form-group textarea {
        resize: vertical; 
        min-height: 200px;
    }

    .submit-btn {
        background-color: #f59e0b; /* Amber to signify editing */
        color: #121212;
        border: none;
        padding: 0.8rem 1.5rem;
        border-radius: 6px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        width: 100%;
        transition: background-color 0.2s ease, transform 0.1s ease;
        font-family: 'Poppins', sans-serif;
    }

    .submit-btn:hover {
        background-color: #d97706;
        color: #ffffff;
        transform: translateY(-2px);
    }
</style>

<div class="form-container">
    <h1 class="page-title">Edit Article</h1>

    <form method="POST" action="{% url 'update_post' post.id %}">
        {% csrf_token %} 
        
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" value="{{ post.title }}" required>
        </div>
        
        <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" name="content" required>{{ post.content }}</textarea>
        </div>
        
        <button type="submit" class="submit-btn">Update Post</button>
    </form>
</div>

{% endblock %}
