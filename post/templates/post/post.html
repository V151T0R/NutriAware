{% extends "base.html" %}

{% block title %}{{ post.title }} | NutriAware {% endblock %}

{% block content %}
    <article>
        <h1>{{ post.title }}</h1>
        
        <div style="margin-top: 1.5rem; text-align: justify; hyphens: auto;">
            {{ post.content|linebreaks }}
        </div>
    </article>

    <div style="margin-top: 2rem;">
        <a href="{% url 'home' %}">&larr; Back to all posts</a>
    </div>
{% endblock %}
